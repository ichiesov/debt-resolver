name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      bot: ${{ steps.filter.outputs.bot }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bot:
              - 'app/**'
              - 'main.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'docker/bot/**'
            web:
              - 'web/**'
              - 'docker/web/**'

  build-bot:
    needs: changes
    if: needs.changes.outputs.bot == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/bot/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/debt-resolver-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: web
          file: docker/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/debt-resolver-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [changes, build-bot, build-web]
    if: |
      always() &&
      (needs.build-bot.result == 'success' || needs.build-web.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/debt-resolver/

      - name: Deploy changed services on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/debt-resolver

            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            BOT_CHANGED="${{ needs.changes.outputs.bot }}"
            WEB_CHANGED="${{ needs.changes.outputs.web }}"

            if [ "$BOT_CHANGED" = "true" ]; then
              docker compose -f docker-compose.prod.yml pull bot
              docker compose -f docker-compose.prod.yml up -d --no-deps bot
            fi

            if [ "$WEB_CHANGED" = "true" ]; then
              docker compose -f docker-compose.prod.yml pull web
              docker compose -f docker-compose.prod.yml up -d --no-deps web
            fi

            docker image prune -f
